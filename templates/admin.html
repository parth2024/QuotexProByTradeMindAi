<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Signal Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .admin-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #6b7280;
            font-size: 14px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 24px;
        }
        
        .status-badge.offline {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }
        
        .status-badge.online {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            color: #111827;
            transition: all 0.2s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .alert {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        
        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .alert.success {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .links {
            margin-top: 24px;
            text-align: center;
        }
        
        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="logo">
            <h1>🔐 Admin Panel</h1>
            <p>Signal Generator Control</p>
        </div>
        
        <div style="text-align: center;">
            <div id="statusBadge" class="status-badge offline">
                <span class="status-dot"></span>
                System Offline
            </div>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Quotex Email</label>
                <input type="email" id="email" placeholder="admin@quotex.com" required>
            </div>
            
            <div class="input-group">
                <label>Quotex Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">
                Connect to Quotex
            </button>
        </form>
        
        <div id="alert" class="alert"></div>
        
        <div class="links">
            <a href="/">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        async function checkStatus() {
            try {
                const res = await fetch('/api/admin/status');
                const data = await res.json();
                
                const badge = document.getElementById('statusBadge');
                if (data.connected) {
                    badge.className = 'status-badge online';
                    badge.innerHTML = '<span class="status-dot"></span>System Online';
                } else {
                    badge.className = 'status-badge offline';
                    badge.innerHTML = '<span class="status-dot"></span>System Offline';
                }
            } catch (err) {
                console.error(err);
            }
        }
        
        checkStatus();
        setInterval(checkStatus, 5000);
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('alert');
            
            btn.disabled = true;
            btn.textContent = 'Connecting...';
            alert.style.display = 'none';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert.className = 'alert success';
                    alert.textContent = '✓ Connected! Redirecting...';
                    alert.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    alert.className = 'alert error';
                    alert.textContent = '✗ ' + data.message;
                    alert.style.display = 'block';
                    
                    btn.disabled = false;
                    btn.textContent = 'Connect to Quotex';
                }
            } catch (err) {
                alert.className = 'alert error';
                alert.textContent = '✗ Connection error';
                alert.style.display = 'block';
                
                btn.disabled = false;
                btn.textContent = 'Connect to Quotex';
            }
        });
    </script>
</body>
</html>
